<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte de Embarque — Roster</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body class="boarding-page">

    <header class="header">
        <a href="../menu.html" class="header-menu">
            <img src="../img/icons8-cardápio-50.png" alt="Menu Hamburguer" class="header-menu__icon">
            <span class="header-menu__text">Menu</span>
        </a>

        <h1 class="header__title">Roster</h1>

        <nav class="header-icons">
            <a href="../perfil.html" class="header-icons__link">
                <img src="../img/icons8-usuário-homem-com-círculo-24.png" alt="Perfil" class="header-icons__icon">
                <span>Perfil</span>
            </a>
        </nav>
    </header>

    <main class="boarding-main">

        <h2 class="boarding-titulo">Suporte de Embarque</h2>

        <!-- Botão de emergência — destaque especial, fora da lista comum -->
        <div class="boarding-emergencia">
            <a href="emergencia.html" class="boarding-emergencia__link">
                <span class="boarding-emergencia__label">EMERGÊNCIA</span>
            </a>
        </div>

        <!-- Dúvidas frequentes -->
        <section class="boarding-faq">
            <h2 class="boarding-faq__titulo">Dúvidas Frequentes</h2>

            <ul class="boarding-lista">

                <li class="boarding-item">
                    <a href="bagagem.html" class="boarding-card">
                        <span class="boarding-card__titulo">Bagagem de mão</span>
                    </a>
                </li>

                <li class="boarding-item">
                    <a href="documentacao.html" class="boarding-card">
                        <span class="boarding-card__titulo">Documentação de menor</span>
                    </a>
                </li>

                <li class="boarding-item">
                    <a href="grupos_priori.html" class="boarding-card">
                        <span class="boarding-card__titulo">Grupos de Prioridade</span>
                    </a>
                </li>

            </ul>
        </section>

        <section class="boarding-ai">
            <h2 class="boarding-ai__titulo">Pergunte à Roster AI</h2>
            <p class="boarding-ai__texto">Sou sua melhor amiga durante o embarque!</p>

            <form class="boarding-ai__form" action="chatAI.html" method="get">
                <textarea class="boarding-ai__input" name="mensagem" rows="3" placeholder="Ex.: Como orientar um passageiro com excesso de bagagem?"></textarea>
                <button type="submit" class="boarding-ai__botao">Enviar</button>
            </form>
        </section>

    </main>

    <footer class="footer">
        <a href="../index.html" class="back-link">
            <img src="../img/icons8-à-esquerda-dentro-de-um-círculo-24.png" alt="" class="back-link__icon">
            <span class="back-link__text">Início</span>
        </a>
        <p>Copyright © 2026 Roster. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
