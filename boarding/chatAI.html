<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster AI</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body class="chat-page">

    <header class="header">
        <a href="../menu.html" class="header-menu">
            <img src="../img/icons8-cardápio-50.png" alt="Menu Hamburguer" class="header-menu__icon">
            <span class="header-menu__text">Menu</span>
        </a>

        <h1 class="header__title">Roster</h1>

        <nav class="header-icons">
            <a href="../perfil.html" class="header-icons__link">
                <img src="../img/icons8-usuário-homem-com-círculo-24.png" alt="Perfil" class="header-icons__icon">
                
            </a>
            <a href="#" class="header-icons__link" aria-label="Notificações">
                <svg class="header-icons__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22" role="img" aria-hidden="true"><path fill="currentColor" d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4a1.5 1.5 0 1 0-3 0v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            </a>
        </nav>
    </header>

    <main class="chat-main">
        <section class="chat-topo">
            <h2 class="chat-titulo">Pergunte à Roster AI</h2>
            <p class="chat-descricao">Seu apoio em tempo real para dúvidas de bordo.</p>
        </section>

        <section class="chat-messages" aria-label="Conversa com a IA" aria-live="polite">
            <div class="chat-bubble chat-bubble--ai">
                Oi! Sou a Roster AI. Posso ajudar com bagagem, documentação, prioridade de embarque e orientações de bordo. Como posso ajudar?
            </div>
        </section>

        <form class="chat-form" action="#" method="post">
            <textarea class="chat-input" rows="3" placeholder="Digite sua mensagem..."></textarea>
            <button type="submit" class="chat-send">Enviar</button>
        </form>
    </main>

    <footer class="footer">
        <a href="boarding.html" class="back-link">
            <img src="../img/icons8-à-esquerda-dentro-de-um-círculo-24.png" alt="" class="back-link__icon">
            <span class="back-link__text">Voltar ao suporte de embarque</span>
        </a>
        <p>Copyright © 2026 Roster. Todos os direitos reservados.</p>
    </footer>

    <script src="../JS/roster.js" defer></script>

</body>
</html>
